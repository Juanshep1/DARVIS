name: SPECTRA
options:
  bundleIdPrefix: com.spectra
  deploymentTarget:
    iOS: "17.0"
targets:
  SPECTRA:
    type: application
    platform: iOS
    sources:
      - DARVIS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spectra.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "SPECTRA needs microphone access for voice commands"
        INFOPLIST_KEY_NSCameraUsageDescription: "SPECTRA uses the camera for visual analysis"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "SPECTRA connects to local AI servers on your network"
        NSAppTransportSecurity: "{'NSAllowsLocalNetworking': true, 'NSAllowsArbitraryLoads': true}"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "SPECTRA uses speech recognition for voice commands"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
