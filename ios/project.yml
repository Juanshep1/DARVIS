name: DARVIS
options:
  bundleIdPrefix: com.darvis
  deploymentTarget:
    iOS: "16.0"
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
targets:
  DARVIS:
    type: application
    platform: iOS
    sources:
      - DARVIS
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darvis.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "DARVIS needs microphone access for voice commands"
        INFOPLIST_KEY_NSCameraUsageDescription: "DARVIS uses the camera for visual analysis"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "DARVIS connects to local AI servers on your network"
        NSAppTransportSecurity: "{'NSAllowsLocalNetworking': true, 'NSAllowsArbitraryLoads': true}"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "DARVIS uses speech recognition for voice commands"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
