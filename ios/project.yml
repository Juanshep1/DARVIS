name: DARVIS
options:
  bundleIdPrefix: com.darvis
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
targets:
  DARVIS:
    type: application
    platform: iOS
    sources:
      - DARVIS
    settings:
      base:
        INFOPLIST_FILE: DARVIS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.darvis.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
