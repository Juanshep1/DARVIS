<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>D.A.R.V.I.S.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, 'SF Mono', 'Fira Code', 'Consolas', monospace;
    height: 100vh; height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
}

.title {
    padding: 24px 0 0;
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: #4a90d9;
    text-transform: uppercase;
}

.orb-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
}

.orb {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
        rgba(80, 180, 255, 0.9),
        rgba(30, 90, 200, 0.6),
        rgba(10, 20, 60, 0.8));
    box-shadow:
        0 0 60px rgba(50, 140, 255, 0.4),
        0 0 120px rgba(50, 140, 255, 0.2),
        inset 0 0 40px rgba(100, 200, 255, 0.3);
    animation: pulse 4s ease-in-out infinite, float 6s ease-in-out infinite;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
}
.orb::after {
    content: '';
    position: absolute;
    top: 15%; left: 20%;
    width: 30%; height: 20%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35), transparent);
    border-radius: 50%;
    filter: blur(4px);
}
.orb.thinking {
    animation: thinkPulse 0.8s ease-in-out infinite, float 6s ease-in-out infinite;
    box-shadow: 0 0 80px rgba(255,150,50,0.5), 0 0 160px rgba(255,150,50,0.2), inset 0 0 50px rgba(255,200,100,0.3);
    background: radial-gradient(circle at 35% 35%, rgba(255,180,80,0.9), rgba(200,100,30,0.6), rgba(60,20,10,0.8));
}
.orb.speaking {
    animation: speakPulse 0.35s ease-in-out infinite, float 6s ease-in-out infinite;
    box-shadow: 0 0 80px rgba(80,255,150,0.5), 0 0 160px rgba(80,255,150,0.2), inset 0 0 50px rgba(150,255,200,0.3);
    background: radial-gradient(circle at 35% 35%, rgba(80,255,160,0.9), rgba(30,180,80,0.6), rgba(10,40,20,0.8));
}
.orb.listening {
    animation: listenPulse 1s ease-in-out infinite, float 6s ease-in-out infinite;
    box-shadow: 0 0 80px rgba(255,80,80,0.5), 0 0 160px rgba(255,80,80,0.2), inset 0 0 50px rgba(255,150,150,0.3);
    background: radial-gradient(circle at 35% 35%, rgba(255,100,100,0.9), rgba(200,40,40,0.6), rgba(60,10,10,0.8));
}

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes thinkPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes speakPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes listenPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.response {
    position: absolute;
    bottom: 10px;
    width: 90%;
    max-width: 550px;
    text-align: center;
    font-size: 0.95rem;
    color: #b0c4de;
    line-height: 1.6;
    padding: 16px;
    max-height: 180px;
    overflow-y: auto;
    left: 50%;
    transform: translateX(-50%);
}

.input-area {
    width: 100%;
    padding: 16px 20px 28px;
    display: flex;
    gap: 10px;
    justify-content: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
.input-area input {
    width: 100%;
    max-width: 480px;
    padding: 14px 20px;
    border: 1px solid rgba(80, 140, 255, 0.3);
    border-radius: 30px;
    background: rgba(15, 15, 25, 0.95);
    color: #e0e0e0;
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
}
.input-area input:focus {
    border-color: rgba(80, 180, 255, 0.7);
    box-shadow: 0 0 20px rgba(50, 140, 255, 0.15);
}
.input-area input::placeholder { color: #444; }

.mic-btn {
    width: 48px; height: 48px; min-width: 48px;
    border-radius: 50%;
    border: 1px solid rgba(80, 140, 255, 0.3);
    background: rgba(15, 15, 25, 0.95);
    color: #4a90d9;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
}
.mic-btn:hover { border-color: rgba(80, 180, 255, 0.7); }
.mic-btn.recording { border-color: #ff4444; color: #ff4444; }

/* Settings */
.settings-toggle {
    position: fixed;
    top: 15px; right: 15px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(80, 140, 255, 0.3);
    background: rgba(15, 15, 25, 0.9);
    color: #4a90d9;
    font-size: 1rem;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;
    padding-top: env(safe-area-inset-top);
}
.settings-toggle:hover { border-color: rgba(80, 180, 255, 0.7); }
.settings-panel {
    position: fixed;
    top: 60px; right: 15px;
    background: rgba(10, 10, 20, 0.95);
    border: 1px solid rgba(80, 140, 255, 0.2);
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    z-index: 100;
    display: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}
.settings-panel.open { display: block; }
.settings-panel label {
    display: block;
    font-size: 0.75rem;
    color: #4a90d9;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 12px 0 6px;
}
.settings-panel label:first-child { margin-top: 0; }
.settings-panel select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid rgba(80, 140, 255, 0.3);
    border-radius: 8px;
    background: rgba(15, 15, 25, 0.9);
    color: #e0e0e0;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    -webkit-appearance: none;
}
.settings-panel select:focus { border-color: rgba(80, 180, 255, 0.7); }
.settings-status {
    margin-top: 12px;
    font-size: 0.75rem;
    color: #5a5;
    min-height: 1.2em;
}

.status {
    position: fixed;
    bottom: 6px;
    font-size: 0.6rem;
    color: #333;
    letter-spacing: 1px;
}

/* Mobile */
@media (max-width: 480px) {
    .orb { width: 140px; height: 140px; }
    .title { padding: 16px 0 0; font-size: 0.6rem; letter-spacing: 3px; }
    .response { font-size: 0.85rem; max-height: 140px; padding: 10px; width: 95%; }
    .input-area { padding: 12px 12px calc(env(safe-area-inset-bottom, 0px) + 16px); }
    .input-area input { padding: 12px 16px; font-size: 0.95rem; }
    .settings-panel { width: calc(100vw - 30px); right: 15px; }
}
@media (max-height: 600px) {
    .orb { width: 120px; height: 120px; }
    .response { max-height: 100px; }
    .title { padding: 8px 0 0; }
    .input-area { padding: 8px 12px 12px; }
}
</style>
</head>
<body>

<button class="settings-toggle" onclick="toggleSettings()">&#9881;</button>
<div class="settings-panel" id="settingsPanel">
    <label>Model</label>
    <select id="modelSelect" onchange="setModel(this.value)"></select>
    <label>Voice</label>
    <select id="voiceSelect" onchange="setVoice(this.value)"></select>
    <div class="settings-status" id="settingsStatus"></div>
</div>

<div class="title">D . A . R . V . I . S .</div>

<div class="orb-container">
    <div class="orb" id="orb" onclick="toggleMic()"></div>
    <div class="response" id="response"></div>
</div>

<div class="input-area">
    <input type="text" id="input" placeholder="Talk to DARVIS..." autocomplete="off"
           onkeydown="if(event.key==='Enter')send()">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">&#x1F3A4;</button>
</div>

<div class="status">POWERED BY OLLAMA CLOUD + ELEVENLABS</div>

<script>
const orb = document.getElementById('orb');
const responseEl = document.getElementById('response');
const inputEl = document.getElementById('input');
const micBtn = document.getElementById('micBtn');
let recognition = null;
let isRecording = false;
let currentAudio = null;
let silenceTimer = null;
const SILENCE_DELAY = 3000; // 3 seconds of silence before auto-send

// Unlock audio on first interaction — create a persistent Audio element
// that we reuse for all TTS playback so the browser trusts it
let audioCtx = null;
let persistentAudio = new Audio();
persistentAudio.setAttribute('playsinline', '');
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
    }
    // Prime the audio element with a silent play so the browser marks it as user-activated
    persistentAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAABhkVuHQgAAAAAAAAAAAAAAAAAAP/7UGQAAAALS0gBQRAAANIKCAoYgAABAAH+AAAJAAADSAAAABAAAAAAACqf/LAAAAAARFRJJF//sqRA';
    persistentAudio.play().then(() => { persistentAudio.pause(); }).catch(() => {});
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

// Web Speech API — continuous mode with silence timeout
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
        // Build full transcript from all results
        let finalText = '';
        let interimText = '';
        for (let i = 0; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
                finalText += transcript;
            } else {
                interimText += transcript;
            }
        }
        // Show what the user is saying in real time
        inputEl.value = (finalText + interimText).trim();

        // Reset the silence timer every time we get new speech
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            // No new speech for SILENCE_DELAY — stop and send
            if (isRecording) {
                recognition.stop();
            }
        }, SILENCE_DELAY);
    };

    recognition.onend = () => {
        clearTimeout(silenceTimer);
        const hadText = inputEl.value.trim().length > 0;
        isRecording = false;
        micBtn.classList.remove('recording');
        if (hadText) {
            send();
        } else if (!orb.classList.contains('thinking') && !orb.classList.contains('speaking')) {
            orb.className = 'orb';
        }
    };

    recognition.onerror = (e) => {
        clearTimeout(silenceTimer);
        // 'no-speech' just means silence — not a real error
        if (e.error === 'no-speech') return;
        isRecording = false;
        micBtn.classList.remove('recording');
        orb.className = 'orb';
    };
}

function toggleMic() {
    if (!recognition) {
        responseEl.textContent = 'Speech recognition not available in this browser. Use Chrome.';
        return;
    }
    if (isRecording) {
        // Manual stop — send whatever we have
        clearTimeout(silenceTimer);
        recognition.stop();
    } else {
        isRecording = true;
        micBtn.classList.add('recording');
        orb.className = 'orb listening';
        inputEl.value = '';
        recognition.start();
    }
}

// Detect if user likely wants to open something — reserve a blank tab NOW
// while we're still inside the user gesture, so the browser allows it
function looksLikeOpenRequest(text) {
    const lower = text.toLowerCase();
    const triggers = [
        'open ', 'go to ', 'pull up ', 'navigate to ', 'take me to ',
        'show me ', 'launch ', 'bring up ', 'load ', 'google ',
    ];
    return triggers.some(t => lower.startsWith(t) || lower.includes('open '));
}

async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';

    if (currentAudio) { persistentAudio.pause(); persistentAudio.currentTime = 0; currentAudio = null; }

    // Pre-open a blank tab during the user gesture so the browser doesn't block it
    let pendingTab = null;
    if (looksLikeOpenRequest(text)) {
        pendingTab = window.open('about:blank', '_blank');
    }

    orb.className = 'orb thinking';
    responseEl.textContent = '';

    try {
        // Get chat response
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        responseEl.textContent = data.reply;

        // Execute any client-side actions (open URLs, etc.)
        if (data.actions) {
            let usedPending = false;
            data.actions.forEach(act => {
                if (act.action === 'open_url' && act.url) {
                    if (pendingTab && !usedPending) {
                        // Redirect the pre-opened tab
                        pendingTab.location.href = act.url;
                        usedPending = true;
                    } else {
                        window.open(act.url, '_blank');
                    }
                }
            });
            // Close the blank tab if it wasn't used
            if (pendingTab && !usedPending) {
                pendingTab.close();
            }
            pendingTab = null;
        } else if (pendingTab) {
            // No actions came back — close the blank tab
            pendingTab.close();
            pendingTab = null;
        }

        // Get TTS audio — use persistent audio element for reliable mobile playback
        try {
            const ttsRes = await fetch('/api/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: data.reply }),
            });

            const contentType = ttsRes.headers.get('content-type') || '';
            if (ttsRes.ok && contentType.includes('audio')) {
                const audioBlob = await ttsRes.blob();
                if (audioBlob.size > 100) {
                    // Revoke any old URL
                    if (currentAudio) {
                        const oldSrc = currentAudio;
                        if (oldSrc._blobUrl) URL.revokeObjectURL(oldSrc._blobUrl);
                    }
                    const audioUrl = URL.createObjectURL(audioBlob);
                    // Reuse the persistent audio element (already user-gesture-primed)
                    persistentAudio.pause();
                    persistentAudio.currentTime = 0;
                    persistentAudio._blobUrl = audioUrl;
                    persistentAudio.src = audioUrl;
                    persistentAudio.onended = () => {
                        orb.className = 'orb';
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                    };
                    persistentAudio.onerror = () => {
                        console.warn('Audio playback error');
                        orb.className = 'orb';
                    };
                    currentAudio = persistentAudio;
                    orb.className = 'orb speaking';
                    await persistentAudio.play();
                    return;
                }
            }
        } catch (ttsErr) {
            console.warn('TTS error:', ttsErr);
        }
        orb.className = 'orb';

    } catch (err) {
        responseEl.textContent = 'Connection error: ' + err.message;
        orb.className = 'orb';
    }
}

// ── Settings ──
function toggleSettings() {
    document.getElementById('settingsPanel').classList.toggle('open');
}

async function loadSettings() {
    const status = document.getElementById('settingsStatus');
    // Load models
    try {
        const res = await fetch('/api/models');
        const data = await res.json();
        const sel = document.getElementById('modelSelect');
        sel.innerHTML = '';
        data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = m;
            if (m === data.current) opt.selected = true;
            sel.appendChild(opt);
        });
    } catch(e) { console.warn('Failed to load models', e); }

    // Load voices
    try {
        const res = await fetch('/api/voices');
        const data = await res.json();
        const sel = document.getElementById('voiceSelect');
        sel.innerHTML = '';
        data.voices.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.id;
            opt.textContent = v.name + (v.category ? ' (' + v.category + ')' : '');
            if (v.id === data.current) opt.selected = true;
            sel.appendChild(opt);
        });
    } catch(e) { console.warn('Failed to load voices', e); }

    status.textContent = 'Settings loaded';
    setTimeout(() => { status.textContent = ''; }, 2000);
}

async function setModel(model) {
    const status = document.getElementById('settingsStatus');
    status.textContent = 'Switching model...';
    try {
        await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model }),
        });
        status.textContent = 'Model: ' + model;
    } catch(e) { status.textContent = 'Error switching model'; }
}

async function setVoice(voice_id) {
    const status = document.getElementById('settingsStatus');
    status.textContent = 'Switching voice...';
    try {
        await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voice_id }),
        });
        status.textContent = 'Voice updated';
    } catch(e) { status.textContent = 'Error switching voice'; }
}

// Close settings when clicking outside
document.addEventListener('click', (e) => {
    const panel = document.getElementById('settingsPanel');
    const toggle = document.querySelector('.settings-toggle');
    if (panel.classList.contains('open') && !panel.contains(e.target) && !toggle.contains(e.target)) {
        panel.classList.remove('open');
    }
});

loadSettings();
inputEl.focus();
</script>
</body>
</html>
